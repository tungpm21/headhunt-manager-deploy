version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: headhunt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: headhunt
      POSTGRES_PASSWORD: headhunt123
      POSTGRES_DB: headhunt_manager
    ports:
      - "5432:5432"
    volumes:
      - headhunt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U headhunt -d headhunt_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  headhunt_pgdata:
    name: headhunt_pgdata
