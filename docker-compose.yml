services:
  postgres:
    image: postgres:16-alpine
    container_name: headhunt-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: headhunt_manager
      POSTGRES_USER: headhunt
      POSTGRES_PASSWORD: headhunt123
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
